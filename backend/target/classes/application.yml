server:
  port: 8080

spring:
  datasource:
    # SQLite数据库路径
    url: jdbc:sqlite:platform.db
    driver-class-name: org.sqlite.JDBC
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # SQLite使用AUTOINCREMENT
      id-type: auto

# 文件上传路径
upload:
  path: ./uploads/
